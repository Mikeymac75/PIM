name: "Mac's Inventory PIM"
version: "1.3"
slug: "pim_app"
description: "Local Home Inventory and Forecasting System with Mealie Integration"
arch:
  - aarch64
  - amd64
startup: application
boot: auto
init: false
options:
  users:
    - "admin:password"
  secret_key: "change_me_to_something_random"
  mealie_url: ""
  mealie_api_token: ""
schema:
  users:
    - str
  secret_key: str
  mealie_url: str?
  mealie_api_token: str?
ports:
  8080/tcp: 8080
map:
  - config:rw
  - share:rw

