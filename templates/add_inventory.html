{% extends "base.html" %}

{% block title %}Add Inventory Stock{% endblock %}

{% block content %}

<!-- Filters Form -->
<form method="GET" action="{{ url_for('add_inventory_stock_view') }}" class="form-filters">
    <h2>Filter Products</h2>
    <div class="form-row">
        <div>
            <label for="search_name">Search by Product Name:</label>
            <input type="text" id="search_name" name="search_name" value="{{ request.args.get('search_name', '') }}">
        </div>
        <div>
            <label for="search_category">Filter by Category:</label>
            <select id="search_category" name="search_category">
                <option value="">All Categories</option>
                {% for category in all_categories %}
                <option value="{{ category }}" {% if request.args.get('search_category') == category %}selected{% endif %}>
                    {{ category }}
                </option>
                {% endfor %}
            </select>
        </div>
    </div>
    <div>
        <button type="submit" class="button-secondary"><i class="fas fa-filter"></i> Apply Filters</button>
    </div>
</form>
<hr>

<h1>Add Stock to Inventory</h1>
<form method="POST" action="{{ url_for('add_inventory_stock_view') }}">
    <div>
        <label for="product_id">Product:</label>
        <select id="product_id" name="product_id" required>
            <option value="">Select a Product...</option>
            {% for product in products %}
            <option value="{{ product.id }}" {% if form_data.product_id == product.id|string %}selected{% endif %}>
                {{ product.name }} (Unit: {{ product.unit_of_measure }})
            </option>
            {% endfor %}
        </select>
    </div>
    <div>
        <label for="quantity_added">Quantity Added:</label>
        <input type="number" step="any" id="quantity_added" name="quantity_added" value="{{ form_data.quantity_added if form_data else '' }}" required>
        <small>Enter a numeric value. The unit of measure is defined by the product (e.g., kg, pcs, liters).</small>
    </div>
    <div>
        <label for="purchase_date">Purchase Date:</label>
        <input type="date" id="purchase_date" name="purchase_date" value="{{ form_data.purchase_date if form_data else '' }}" required>
    </div>
    <div>
        <button type="submit" class="button"><i class="fas fa-plus-circle"></i> Add Stock</button>
    </div>
</form>
{% endblock %}
