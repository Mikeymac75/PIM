{% extends "base.html" %}

{% block title %}Create New Product{% endblock %}

{% block content %}
<h1>Create New Product</h1>
<form method="POST" action="{{ url_for('create_product_view') }}">
    <div>
        <label for="name">Product Name:</label>
        <input type="text" id="name" name="name" value="{{ form_data.name if form_data else '' }}" required>
    </div>
    <div>
        <label for="category">Category:</label>
        <input type="text" id="category" name="category" value="{{ form_data.category if form_data else '' }}">
    </div>
    <div>
        <label for="subcategory">Subcategory:</label>
        <input type="text" id="subcategory" name="subcategory" value="{{ form_data.subcategory if form_data else '' }}">
    </div>
    <div>
        <label for="unit_of_measure">Unit of Measure:</label>
        <input type="text" id="unit_of_measure" name="unit_of_measure" value="{{ form_data.unit_of_measure if form_data else '' }}" required>
    </div>
    <div>
        <label for="default_expiry_days">Default Expiry Days:</label>
        <input type="number" id="default_expiry_days" name="default_expiry_days" value="{{ form_data.default_expiry_days if form_data else '' }}" min="0" required>
    </div>
    <div>
        <label for="par_level">Par Level:</label>
        <input type="number" id="par_level" name="par_level" value="{{ form_data.par_level if form_data else '0' }}" min="0" step="any">
    </div>
    <div>
        <label for="max_holding_amount">Max Holding Amount:</label>
        <input type="number" id="max_holding_amount" name="max_holding_amount" value="{{ form_data.max_holding_amount if form_data else '0' }}" min="0" step="any">
    </div>
    <div>
        <label for="purchase_location">Default Purchase Location:</label>
        <input type="text" id="purchase_location" name="purchase_location" value="{{ form_data.purchase_location if form_data else '' }}">
    </div>
    <div>
        <button type="submit" class="button"><i class="fas fa-plus-square"></i> Create Product</button>
    </div>
</form>
{% endblock %}
