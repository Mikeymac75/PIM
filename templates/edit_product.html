{% extends "base.html" %}

{% block title %}Edit Product: {{ product.name }}{% endblock %}

{% block content %}
<h1>Edit Product: {{ product.name }}</h1>
<form method="POST" action="{{ url_for('edit_product_view', product_id=product.id) }}">
    <div>
        <label for="name">Product Name:</label>
        <input type="text" id="name" name="name" value="{{ product.name }}" required>
    </div>
    <div>
        <label for="category">Category:</label>
        <input type="text" id="category" name="category" value="{{ product.category if product.category is not none else '' }}">
    </div>
    <div>
        <label for="subcategory">Subcategory:</label>
        <input type="text" id="subcategory" name="subcategory" value="{{ product.subcategory if product.subcategory is not none else '' }}">
    </div>
    <div>
        <label for="unit_of_measure">Unit of Measure:</label>
        <input type="text" id="unit_of_measure" name="unit_of_measure" value="{{ product.unit_of_measure }}" required>
    </div>
    <div>
        <label for="default_expiry_days">Default Expiry Days:</label>
        <input type="number" id="default_expiry_days" name="default_expiry_days" value="{{ product.default_expiry_days }}" min="0" required>
    </div>
    <div>
        <label for="par_level">Par Level:</label>
        <input type="number" id="par_level" name="par_level" value="{{ product.par_level if product.par_level is not none else '0' }}" min="0" step="any">
    </div>
    <div>
        <label for="max_holding_amount">Max Holding Amount:</label>
        <input type="number" id="max_holding_amount" name="max_holding_amount" value="{{ product.max_holding_amount if product.max_holding_amount is not none else '0' }}" min="0" step="any">
    </div>
    <div>
        <label for="purchase_location">Default Purchase Location:</label>
        <input type="text" id="purchase_location" name="purchase_location" value="{{ product.purchase_location if product.purchase_location is not none else '' }}">
    </div>
    <div>
        <button type="submit">Update Product</button>
    </div>
</form>
<p><a href="{{ url_for('list_products_view') }}">Cancel and return to Product List</a></p>
{% endblock %}
