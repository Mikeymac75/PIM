{% extends "base.html" %}

{% block title %}Add New Item - Food Inventory Manager{% endblock %}

{% block page_header %}
    <h1 class="page-title">Add New Grocery Item</h1>
{% endblock %}

{% block content %}
    <form method="POST" action="{{ url_for('add_item_view') }}">
        <div class="form-group">
            <label for="name">Item Name:</label>
            <input type="text" id="name" name="name" class="form-control" value="{{ form_data.get('name', '') }}" required>
        </div>

        <div class="form-group">
            <label for="quantity">Quantity:</label>
            <input type="text" id="quantity" name="quantity" class="form-control" value="{{ form_data.get('quantity', '') }}" required>
            <small class="help-text">E.g., "2 lbs", "1 gallon", "12", "1 loaf"</small>
        </div>

        <div class="form-group">
            <label for="purchase_date">Purchase Date:</label>
            <input type="date" id="purchase_date" name="purchase_date" class="form-control" value="{{ form_data.get('purchase_date', '') }}" required>
        </div>

        <div class="form-group">
            <label for="expiry_days">Expiry Days (from purchase date):</label>
            <input type="number" id="expiry_days" name="expiry_days" class="form-control" value="{{ form_data.get('expiry_days', '') }}" min="0" required>
        </div>

        <button type="submit" class="button">Add Item</button>
    </form>

    <p style="margin-top: 20px;"><a href="{{ url_for('home') }}" class="nav-link-button">Back to Home</a></p>
{% endblock %}
