{% extends "base.html" %}

{% block title %}Log a Purchase{% endblock %}

{% block content %}

<!-- Filters Form for Product Selection -->
<form method="GET" action="{{ url_for('log_purchase_view') }}" class="form-filters">
    <h2>Filter Products for Purchase Log</h2>
    <div class="form-row">
        <div>
            <label for="search_name">Search by Product Name:</label>
            <input type="text" id="search_name" name="search_name" value="{{ request.args.get('search_name', '') }}">
        </div>
        <div>
            <label for="search_category">Filter by Category:</label>
            <select id="search_category" name="search_category">
                <option value="">All Categories</option>
                {% for category_name in all_categories %}
                <option value="{{ category_name }}" {% if request.args.get('search_category') == category_name %}selected{% endif %}>
                    {{ category_name }}
                </option>
                {% endfor %}
            </select>
        </div>
    </div>
    <div>
        <button type="submit" class="button-secondary"><i class="fas fa-filter"></i> Apply Filters</button>
    </div>
</form>
<hr>

<h1>Log a Purchase</h1>
<form method="POST" action="{{ url_for('log_purchase_view') }}">
    <div>
        <label for="product_id">Product:</label>
        <select id="product_id" name="product_id" required>
            <option value="">Select a Product...</option>
            {% for product in products_for_dropdown %}
            <option value="{{ product.id }}" {% if form_data.product_id == product.id|string %}selected{% endif %}>
                {{ product.name }} (Unit: {{ product.unit_of_measure }})
            </option>
            {% endfor %}
        </select>
    </div>
    <div>
        <label for="purchase_date">Purchase Date:</label>
        <input type="date" id="purchase_date" name="purchase_date" value="{{ form_data.get('purchase_date', today_date_iso) }}" required>
    </div>
    <div>
        <label for="quantity_purchased">Quantity Purchased:</label>
        <input type="number" step="any" id="quantity_purchased" name="quantity_purchased" value="{{ form_data.get('quantity_purchased', '') }}" required>
        <small>Enter a numeric value. Unit corresponds to the selected product's unit of measure.</small>
    </div>
    <div>
        <label for="cost_per_unit">Cost Per Unit (e.g., price for one item, one kg):</label>
        <input type="number" step="0.01" id="cost_per_unit" name="cost_per_unit" value="{{ form_data.get('cost_per_unit', '') }}" required>
    </div>
    <div>
        <label for="vendor">Vendor (e.g., "Sobeys", "Costco"):</label>
        <input type="text" id="vendor" name="vendor" value="{{ form_data.get('vendor', '') }}">
    </div>
    <div>
        <button type="submit" class="button"><i class="fas fa-save"></i> Log Purchase</button>
    </div>
</form>
{% endblock %}
